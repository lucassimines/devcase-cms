name: ci

on: push

jobs:
  admin:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: admin/package-lock.json

      - name: Install admin dependencies
        working-directory: admin
        run: npm ci

      - name: Lint
        working-directory: admin
        run: npm run lint

      - name: Typecheck
        working-directory: admin
        run: npm run typecheck

      - name: Test
        working-directory: admin
        run: npm test

  server:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres@localhost:5432/devcase_test
      TEST_DATABASE_URL: postgresql://postgres@localhost:5432/devcase_test
      TEST_DATABASE_ADMIN_URL: postgresql://postgres@localhost:5432/postgres

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install server dependencies
        working-directory: server
        run: npm ci

      - name: Generate Prisma client
        working-directory: server
        run: npx prisma generate

      - name: Test
        working-directory: server
        run: npm test
